<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIX-OS v1.0.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: monospace; }
        .terminal-border { border: 1px solid #004411; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">
    <div class="terminal-border bg-black p-2 mb-4 text-xs">
        [ SYSTEM ONLINE ] - FLIX-CORE v1.0.3
    </div>
    
    <div id="chat-box" class="flex-1 overflow-y-auto mb-4 space-y-2 text-sm p-2 border border-[#002200]">
        </div>

    <div class="flex gap-2">
        <input id="user-input" type="text" class="flex-1 bg-black border border-[#004411] p-3 outline-none focus:border-[#00ff41]" placeholder="Enter command...">
        <button onclick="send()" class="bg-[#004411] px-6 py-2 hover:bg-[#008822]">EXEC</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            if(!input.value) return;

            box.innerHTML += `<div class="text-white">> ${input.value}</div>`;
            const msg = input.value;
            input.value = '';

            try {
                const res = await fetch('/api/webhook', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ agent_id: 'ID_HERE', message: msg }) // استبدل ID_HERE بمعرف وكيلك
                });
                const data = await res.json();
                box.innerHTML += `<div class="text-[#00ff41]">[AI]: ${data.reply || data.details}</div>`;
            } catch (e) {
                box.innerHTML += `<div class="text-red-500">[ERR]: Connection Failed</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

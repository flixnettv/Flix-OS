<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIX-OS CORE v1.0.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');
        body { 
            background-color: #050505; 
            color: #00ff41; 
            font-family: 'Fira Code', monospace; 
            height: 100vh;
            display: flex;
            flex-col: column;
        }
        .terminal-shadow { box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .cursor-blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .msg-entry { border-right: 2px solid #004411; margin-bottom: 10px; padding: 5px 10px; }
    </style>
</head>
<body class="p-4 overflow-hidden flex flex-col">

    <div class="border border-[#004411] p-2 bg-[#0a0a0a] flex justify-between items-center text-[10px] mb-4">
        <div>
            <span class="opacity-50">NODE_20_STABLE</span><br>
            <span class="text-[#00ff41] font-bold">FLIX-OS // CORE_INTERFACE</span>
        </div>
        <div class="text-right">
            <span class="bg-[#004411] px-1">ACTIVE</span><br>
            <span id="time-display">00:00:00</span>
        </div>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto border border-[#002200] bg-black p-4 mb-4 scroll-smooth">
        <div class="text-[10px] opacity-40 mb-4 text-center">-- System Initialized v1.0.3 --</div>
        <div class="text-[#00ff41] mb-2">> System standby... <span class="cursor-blink">_</span></div>
    </div>

    <div class="border border-[#004411] bg-[#0a0a0a] p-2 flex gap-2">
        <input 
            id="user-input" 
            type="text" 
            class="flex-1 bg-transparent border-none outline-none text-[#00ff41] placeholder-[#004411] text-sm"
            placeholder="ENTER COMMAND AND PRESS EXEC..."
            onkeypress="if(event.key === 'Enter') send()"
        >
        <button 
            onclick="send()" 
            class="bg-[#00ff41] text-black font-bold px-6 py-1 text-xs hover:bg-white transition-colors"
        >
            EXECUTE
        </button>
    </div>

    <script>
        // تحديث الوقت
        setInterval(() => {
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString();
        }, 1000);

        async function send() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const msg = input.value.trim();

            if (!msg) return;

            // إضافة رسالة المستخدم للواجهة
            box.innerHTML += `
                <div class="flex justify-end mb-4">
                    <div class="bg-[#002200] border border-[#00ff41] p-2 text-sm max-w-[80%]">
                        <span class="text-[10px] opacity-50 block">USR_INPUT</span>
                        ${msg}
                    </div>
                </div>`;
            
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // إشارة المعالجة
            const tempId = "sys-" + Date.now();
            box.innerHTML += `<div id="${tempId}" class="text-[10px] italic opacity-50 animate-pulse">SYS: Fetching response...</div>`;

            try {
                // ملاحظة: نرسل الطلب، والباك-إيند سيتولى اختيار أول وكيل لو الـ ID فارغ
                const response = await fetch('/api/webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        agent_id: '', // سيقوم الباك-إيند بجلب أول وكيل متاح تلقائياً
                        message: msg 
                    })
                });

                const data = await response.json();
                document.getElementById(tempId).remove();

                if (data.reply) {
                    box.innerHTML += `
                        <div class="flex justify-start mb-4">
                            <div class="bg-[#050505] border border-[#004411] p-3 text-sm max-w-[85%] relative">
                                <span class="text-[10px] text-[#00ff41] opacity-50 block mb-1">AGENT_STREAM_OUT</span>
                                ${data.reply}
                            </div>
                        </div>`;
                } else {
                    throw new Error(data.details || "API_ROUTING_ERROR");
                }
            } catch (err) {
                document.getElementById(tempId).innerHTML = `<span class="text-red-500 text-[10px]">[FATAL_ERROR]: ${err.message}</span>`;
            }
            
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIX-OS | Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; background-color: #000; color: #10b981; }
        .terminal-glow { text-shadow: 0 0 5px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('root').innerHTML = `<div style="color:#ef4444; padding:20px;">
                <h2 style="font-weight:bold"> [System Boot Error] </h2>
                <p>السبب: ${msg}</p>
                <p>السطر: ${line}</p>
            </div>`;
        };
    </script>

    <script type="text/babel" src="App.js"></script>
</body>
</html>
